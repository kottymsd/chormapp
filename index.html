<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURACLOUD | VIPER CONSOLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --hazard-yellow: #FFD700;
            --onyx-black: #0A0A0A;
        }
        body {
            background-color: #000;
            color: #fff;
            background-image: radial-gradient(circle at 0% 0%, #1a1a1a 0%, #000 100%);
        }
        .stripes {
            background: linear-gradient(135deg, var(--hazard-yellow) 25%, #000 25%, #000 50%, var(--hazard-yellow) 50%, var(--hazard-yellow) 75%, #000 75%, #000 100%);
            background-size: 14px 14px;
        }
        .viper-card {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #222;
            transition: 0.3s;
        }
        .viper-card:hover {
            border-color: var(--hazard-yellow);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }
        .btn-premium {
            background: var(--hazard-yellow);
            color: black;
            font-weight: 900;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
        }
        .btn-premium::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }
        .btn-premium:hover::after { left: 100%; }
        .btn-premium:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--hazard-yellow); }
    </style>
</head>
